      <line x1="0" y1="130" x2="480" y2="130"/>
    </g>
    <circle cx="440" cy="22" r="10" fill="#3d1706" stroke="#7c3812" stroke-width="2"/>
  </g>
  <text x="300" y="110" text-anchor="middle" fill="#f1f3f4" opacity="0.8" font-family="Georgia, serif" font-style="italic" font-size="20">R-7.3 · 4-season</text>
</svg>
