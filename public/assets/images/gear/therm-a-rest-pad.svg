<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 450" role="img" aria-label="Illustration of an inflated sleeping pad">
  <defs>
    <linearGradient id="p-bg" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0" stop-color="#1a2530"/>
      <stop offset="1" stop-color="#0b0d0e"/>
    </linearGradient>
    <linearGradient id="p-pad" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0" stop-color="#e89558"/>
      <stop offset="1" stop-color="#b14d1a"/>
    </linearGradient>
  </defs>
  <rect width="600" height="450" fill="url(#p-bg)"/>
  <ellipse cx="300" cy="400" rx="260" ry="14" fill="#000" opacity="0.35"/>
