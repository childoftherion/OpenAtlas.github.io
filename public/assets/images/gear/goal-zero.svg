      <stop offset="0" stop-color="#1c2430"/>
      <stop offset="1" stop-color="#0b0d0e"/>
    </linearGradient>
  </defs>
  <rect width="600" height="450" fill="url(#ps-bg)"/>
  <ellipse cx="300" cy="405" rx="180" ry="10" fill="#000" opacity="0.4"/>
