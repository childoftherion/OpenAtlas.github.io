<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 450" role="img" aria-label="Illustration of recovery boards">
  <defs>
    <linearGradient id="m-bg" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0" stop-color="#1c2430"/>
      <stop offset="1" stop-color="#0b0d0e"/>
    </linearGradient>
    <linearGradient id="m-board" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0" stop-color="#e89558"/>
      <stop offset="1" stop-color="#b14d1a"/>
    </linearGradient>
  </defs>
  <rect width="600" height="450" fill="url(#m-bg)"/>
  <ellipse cx="300" cy="410" rx="200" ry="10" fill="#000" opacity="0.4"/>
  <g transform="translate(300,225) rotate(-8)">
    <rect x="-210" y="-70" width="420" height="50" rx="16" fill="url(#m-board)" stroke="#7c3812" stroke-width="2"/>
    <g fill="#7c3812">
      <circle cx="-180" cy="-45" r="6"/><circle cx="-140" cy="-45" r="6"/><circle cx="-100" cy="-45" r="6"/>
      <circle cx="-60" cy="-45" r="6"/><circle cx="-20" cy="-45" r="6"/><circle cx="20" cy="-45" r="6"/>
      <circle cx="60" cy="-45" r="6"/><circle cx="100" cy="-45" r="6"/><circle cx="140" cy="-45" r="6"/>
      <circle cx="180" cy="-45" r="6"/>
    </g>
  </g>
  <g transform="translate(300,260) rotate(6)">
    <rect x="-210" y="-20" width="420" height="50" rx="16" fill="url(#m-board)" stroke="#7c3812" stroke-width="2"/>
    <g fill="#7c3812">
      <circle cx="-180" cy="5" r="6"/><circle cx="-140" cy="5" r="6"/><circle cx="-100" cy="5" r="6"/>
      <circle cx="-60" cy="5" r="6"/><circle cx="-20" cy="5" r="6"/><circle cx="20" cy="5" r="6"/>
      <circle cx="60" cy="5" r="6"/><circle cx="100" cy="5" r="6"/><circle cx="140" cy="5" r="6"/>
      <circle cx="180" cy="5" r="6"/>
